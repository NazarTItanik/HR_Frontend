<div class="card surface-card border-round-xl shadow-2 m-4 p-4">

    <div class="flex justify-content-between align-items-center mb-4">
        <h1 class="text-3xl font-bold m-0">Employees</h1>

        <div class="flex gap-2">
            <!-- <input pInputText type="text" placeholder="Search..." (input)="searchText.set($any($event.target).value)"
                class="p-inputtext" /> -->

            <p-button icon="pi pi-list" label="Group By" severity="secondary" [outlined]="true"
                (onClick)="groupByPanel.toggle($event)"></p-button>

            <p-button icon="pi pi-angle-down" label="Actions" severity="secondary" [outlined]="true"></p-button>

            <p-button icon="pi pi-plus" label="Create" severity="danger" (onClick)="onAddEmployee()"></p-button>
        </div>
    </div>

    <p-popover #groupByPanel>
        <div class="flex flex-column" style="min-width: 160px">
            <div *ngFor="let item of groupByOptionsList"
                class="flex align-items-center gap-2 p-2 cursor-pointer border-round hover:surface-100"
                [style.background]="groupBy() === item.value ? 'var(--surface-hover)' : 'transparent'"
                (click)="setGroupBy(item.value); groupByPanel.hide()">
                <i [class]="item.icon"></i>
                <span>{{ item.label }}</span>
            </div>
        </div>
    </p-popover>
    <div class="flex align-items-center mb-3" *ngIf="selectedEmployees.length > 0">
        <p-button label="Delete Selected" icon="pi pi-trash" severity="danger"
            (onClick)="onDeleteSelected()"></p-button>
        <span class="ml-3">{{ selectedEmployees.length }} items selected</span>
    </div>

    <p-table [value]="groupedEmployees()" showGridlines [(selection)]="selectedEmployees" dataKey="id"
        [paginator]="true" [rows]="10" rowGroupMode="subheader" [groupRowsBy]="groupBy() ?? ''"
        styleClass="p-datatable-sm">

        <ng-template pTemplate="header">
            <tr>
                <th style="width: 3rem"><p-tableHeaderCheckbox></p-tableHeaderCheckbox></th>
                <th>Employee</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Position</th>
                <th>Work Type</th>
                <th class="text-center">Actions</th>
            </tr>
        </ng-template>

        <ng-template pTemplate="groupheader" let-emp>
            <tr pRowGroupHeader>
                <td colspan="7" class="font-bold text-700 py-3 px-3 surface-100">
                    <i class="pi pi-tag mr-2"></i>{{ emp[groupBy()!] || 'Unassigned' }}
                </td>
            </tr>
        </ng-template>

        <ng-template pTemplate="body" let-emp>
            <tr [pSelectableRow]="emp">
                <td><p-tableCheckbox [value]="emp"></p-tableCheckbox></td>

                <td>
                    <div class="flex align-items-center gap-3">
                        <p-avatar [label]="emp.firstName.charAt(0) + emp.lastName.charAt(0)" shape="square" size="large"
                            styleClass="avatar-blue">
                        </p-avatar>
                        <div class="flex flex-column">
                            <span class="font-semibold text-900">{{ emp.firstName }} {{ emp.lastName }}</span>
                        </div>
                    </div>
                </td>

                <td class="text-700">{{ emp.email }}</td>
                <td class="text-700">{{ emp.phone }}</td>
                <td class="text-700">{{ emp.position }}</td>
                <td class="text-700">
                    <p-tag [value]="emp.workType" severity="info"></p-tag>
                </td>

                <td class="text-center">
                    <p-button icon="pi pi-ellipsis-v" [text]="true" severity="secondary" [rounded]="true"
                        (onClick)="menu.toggle($event)"></p-button>
                    <p-menu #menu [popup]="true" [model]="actionItems" appendTo="body"></p-menu>
                </td>
            </tr>
        </ng-template>

        <ng-template pTemplate="emptymessage">
            <tr>
                <td colspan="7" class="text-center p-5 text-500">No employees found.</td>
            </tr>
        </ng-template>
    </p-table>
</div>

<app-dynamic-form-dialog header="Create Employee" saveLabel="Create" [(visible)]="createDialogVisible"
    [form]="employeeForm" [fields]="employeeFields" (saved)="onSubmitEmployee($event)" (cancelled)="closeDialog()">
</app-dynamic-form-dialog>
