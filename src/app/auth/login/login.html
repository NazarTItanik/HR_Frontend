<div class="login-page">

    <div class="login-container">
        <p-card styleClass="shadow-2 border-round-2xl">

            <ng-template pTemplate="header">
                <div class="text-center pt-5 pb-3">
                    <div class="logo-circle">
                        <i class="pi pi-lock"></i>
                    </div>
                    <h1 class="text-3xl font-bold text-900 mt-3 mb-2">HR System</h1>
                    <p class="text-500 m-0">Enter your credentials to access the system</p>
                </div>
            </ng-template>

            <form [formGroup]="loginForm" (ngSubmit)="onLogin()" class="login-form">

                <p-floatlabel>
                    <input id="username" type="text" pInputText formControlName="username" fluid />
                    <label for="username">Username <span class="text-red-500">*</span></label>
                </p-floatlabel>

                <p-floatlabel>
                    <p-password id="password" formControlName="password" [toggleMask]="true" [feedback]="false"
                        [fluid]="true">
                    </p-password>
                    <label for="password">Password <span class="text-red-500">*</span></label>
                </p-floatlabel>

                <div class="flex justify-content-between align-items-center text-sm">
                    <div class="flex align-items-center gap-2">
                        <p-checkbox formControlName="rememberMe" [binary]="true" inputId="rem"></p-checkbox>
                        <label for="rem" class="text-700 cursor-pointer">Remember me</label>
                    </div>
                    <a href="#" class="text-red-500 no-underline font-medium hover:underline">
                        Forgot password?
                    </a>
                </div>

                <p-button label="Login" type="submit" [loading]="loading" severity="success" size="large"
                    [fluid]="true">
                </p-button>

            </form>

            <ng-template pTemplate="footer">
                <div class="text-center text-500 text-sm">
                    New here?
                    <a (click)="onApply()" class="text-red-500 no-underline font-medium cursor-pointer hover:underline">
                        Apply for Job
                    </a>
                </div>
            </ng-template>

        </p-card>
    </div>
</div>
